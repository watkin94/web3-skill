<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>web3.skill wechat demo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eef1f5 0%, #e4e9ef 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #111827;
      padding: 32px;
    }

    .phone {
      width: 430px;
      background: #f6f7f9;
      border-radius: 44px;
      padding: 14px;
      box-shadow: 0 32px 80px rgba(15, 23, 42, 0.16);
    }

    .screen {
      border-radius: 34px;
      overflow: hidden;
      background: #ededed;
      border: 1px solid rgba(17, 24, 39, 0.06);
    }

    .status {
      height: 42px;
      background: #f7f7f7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      font-size: 13px;
      font-weight: 600;
      color: #111827;
    }

    .dynamic-island {
      width: 116px;
      height: 30px;
      border-radius: 18px;
      background: #0f172a;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 22px;
    }

    .nav {
      height: 58px;
      background: #f7f7f7;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 18px;
      font-weight: 600;
    }

    .nav .back {
      position: absolute;
      left: 18px;
      color: #111827;
      font-size: 17px;
      font-weight: 500;
    }

    .chat {
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.26), transparent 45%),
        #ededed;
      padding: 18px 14px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(180deg, #d8dee6 0%, #c7d0db 100%);
      border: 1px solid rgba(17, 24, 39, 0.06);
      flex: 0 0 auto;
    }

    .avatar.skill {
      background: linear-gradient(180deg, #0f172a 0%, #1f2937 100%);
      position: relative;
    }

    .avatar.skill::after {
      content: "w3";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #f8fafc;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .avatar.user {
      background: linear-gradient(180deg, #d7ecb9 0%, #bfe294 100%);
    }

    .bubble {
      max-width: 292px;
      padding: 12px 14px;
      border-radius: 18px;
      font-size: 16px;
      line-height: 1.55;
      box-shadow: 0 1px 0 rgba(17, 24, 39, 0.04);
      position: relative;
      word-break: break-word;
    }

    .bubble.receive {
      background: #ffffff;
      color: #111827;
      border-top-left-radius: 6px;
    }

    .bubble.send {
      background: #95ec69;
      color: #111827;
      border-top-right-radius: 6px;
    }

    .time {
      align-self: center;
      background: rgba(15, 23, 42, 0.08);
      color: rgba(17, 24, 39, 0.60);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      margin: 2px 0 2px;
    }

    code {
      background: rgba(15, 23, 42, 0.06);
      border-radius: 8px;
      padding: 1px 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    .inputbar {
      height: 66px;
      background: #f7f7f7;
      border-top: 1px solid rgba(15, 23, 42, 0.06);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
    }

    .plus, .voice {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(17, 24, 39, 0.08);
      display: grid;
      place-items: center;
      color: rgba(17, 24, 39, 0.64);
      font-size: 18px;
      background: #ffffff;
    }

    .input {
      flex: 1;
      height: 38px;
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid rgba(17, 24, 39, 0.06);
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="dynamic-island"></div>
    <div class="screen">
      <div class="status">
        <span>9:41</span>
        <span>5G 100%</span>
      </div>
      <div class="nav">
        <span class="back">‹ 微信</span>
        <span>web3.skill</span>
      </div>
      <div class="chat">
        <div class="time">下午 3:16</div>

        <div class="msg-row user">
          <div class="bubble send">rug 是什么意思？</div>
          <div class="avatar user"></div>
        </div>

        <div class="msg-row">
          <div class="avatar skill"></div>
          <div class="bubble receive">就是 <code>rug pull</code>，简单说就是项目方把桌布一抽，人全摔下去。圈里说某个币会 rug，基本就是在说它可能直接埋人。</div>
        </div>

        <div class="msg-row user">
          <div class="bubble send">币圈如何套利？</div>
          <div class="avatar user"></div>
        </div>

        <div class="msg-row">
          <div class="avatar skill"></div>
          <div class="bubble receive">先别把套利想成无风险搬砖。说白了你是在和手续费、滑点、到账速度赛跑，新手最容易死在成本没算清。</div>
        </div>

        <div class="msg-row user">
          <div class="bubble send">什么是 DeFi？</div>
          <div class="avatar user"></div>
        </div>

        <div class="msg-row">
          <div class="avatar skill"></div>
          <div class="bubble receive">你先把 DeFi 理解成“把金融服务搬到链上”。借贷、交易、赚收益都能做，只是规则不靠柜台和平台，更多写在合约里。</div>
        </div>
      </div>
      <div class="inputbar">
        <div class="voice">＋</div>
        <div class="input"></div>
        <div class="plus">⌕</div>
      </div>
    </div>
  </div>
</body>
</html>
